<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Генератор идей</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --surface: #1c1c1e;
      --surface-hover: #2c2c2e;
      --primary: #0a84ff;
      --primary-soft: rgba(10, 132, 255, 0.18);
      --text: #f5f5f7;
      --text-secondary: #8e8e93;
      --border: #38383a;
      --chevron: #636366;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      --desktop-bg: #0d0d0f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      min-height: 100%;
      min-height: 100dvh;
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
    }

    .header {
      padding: max(1rem, env(safe-area-inset-top)) 1.25rem 1.25rem;
      padding-top: max(2.75rem, calc(env(safe-area-inset-top) + 1.25rem));
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: 1.625rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 0.2rem;
    }

    .subtitle {
      font-size: 0.9375rem;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .content {
      flex: 1;
      padding: 1.5rem 1rem max(1.5rem, env(safe-area-inset-bottom));
    }

    .list-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      padding-left: 0.75rem;
    }

    .list-group {
      list-style: none;
      background: var(--surface);
      border-radius: 14px;
      overflow: hidden;
    }

    .list-group li + li {
      border-top: 1px solid var(--border);
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      width: 100%;
      min-height: 3.25rem;
      padding: 0.875rem 1rem;
      background: var(--surface);
      border: none;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
    }

    .list-item:active {
      background: var(--primary-soft);
    }

    .list-item-icon {
      flex-shrink: 0;
      width: 2.25rem;
      height: 2.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .list-item-icon svg {
      width: 1.125rem;
      height: 1.125rem;
    }

    .list-item-text {
      flex: 1;
      min-width: 0;
    }

    .list-item-chevron {
      flex-shrink: 0;
      color: var(--chevron);
      display: flex;
      align-items: center;
    }

    .list-item-chevron svg {
      width: 1.125rem;
      height: 1.125rem;
    }

    @media (min-width: 520px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: var(--desktop-bg);
      }

      .app {
        min-height: auto;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        background: var(--bg);
      }

      .header {
        padding-top: 2rem;
        position: static;
      }

      .content {
        padding: 1.25rem 1.25rem 1.5rem;
      }

      .list-item:hover {
        background: var(--surface-hover);
      }

      .list-item:active {
        background: var(--primary-soft);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Генератор идей</h1>
      <p class="subtitle">для постов</p>
    </header>
    <main class="content">
      <p class="list-title">Что можно создать</p>
      <ul class="list-group">
        <li>
          <button type="button" class="list-item">
            <span class="list-item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
              </svg>
            </span>
            <span class="list-item-text">5 идей постов для экспертов</span>
            <span class="list-item-chevron" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6"/>
              </svg>
            </span>
          </button>
        </li>
        <li>
          <button type="button" class="list-item">
            <span class="list-item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="2" width="14" height="20" rx="2"/>
                <path d="M12 18h.01"/>
              </svg>
            </span>
            <span class="list-item-text">3 идеи сторис на сегодня</span>
            <span class="list-item-chevron" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6"/>
              </svg>
            </span>
          </button>
        </li>
        <li>
          <button type="button" class="list-item">
            <span class="list-item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <path d="M16 2v4M8 2v4M3 10h18"/>
              </svg>
            </span>
            <span class="list-item-text">Контент-план на неделю</span>
            <span class="list-item-chevron" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6"/>
              </svg>
            </span>
          </button>
        </li>
      </ul>
    </main>
  </div>
</body>
</html>
